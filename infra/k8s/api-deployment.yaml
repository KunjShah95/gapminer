apiVersion: apps/v1
kind: Deployment
metadata:
  name: gapminer-api
  labels:
    app: gapminer-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gapminer-api
  template:
    metadata:
      labels:
        app: gapminer-api
    spec:
      containers:
        - name: api
          image: gapminer/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gapminer-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: gapminer-config
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gapminer-secrets
                  key: secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gapminer-api
spec:
  selector:
    app: gapminer-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP