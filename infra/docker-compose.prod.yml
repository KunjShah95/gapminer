version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gapminer-postgres
    environment:
      POSTGRES_DB: gapminer
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gapminer-network

  # Redis for caching and queue
  redis:
    image: redis:7-alpine
    container_name: gapminer-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gapminer-network

  # API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runner
    container_name: gapminer-api
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/gapminer
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=["https://${DOMAIN}","http://localhost:3000"]
      - SENTRY_DSN=${SENTRY_DSN:-}
      - DEBUG=false
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    restart: unless-stopped
    networks:
      - gapminer-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (served via nginx)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: runner
    container_name: gapminer-web
    ports:
      - "3000:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - gapminer-network

  # Ollama for local AI (optional - disable if using cloud AI)
  ollama:
    image: ollama/ollama:latest
    container_name: gapminer-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    networks:
      - gapminer-network
    profiles:
      - ai

  # Nginx reverse proxy (optional - for TLS termination)
  nginx:
    image: nginx:alpine
    container_name: gapminer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - gapminer-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  uploads:
  logs:

networks:
  gapminer-network:
    driver: bridge
