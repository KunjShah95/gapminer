apiVersion: v1
kind: ConfigMap
metadata:
  name: gapminer-config
data:
  redis-url: "redis://gapminer-redis:6379"
  ollama-url: "http://gapminer-ollama:11434"
---
apiVersion: v1
kind: Secret
metadata:
  name: gapminer-secrets
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://postgres:postgres@postgres:5432/gapminer"
  secret-key: "change-this-in-production-use-strong-random-key"
  google-client-id: ""
  google-client-secret: ""
---
apiVersion: v1
kind: Service
metadata:
  name: gapminer-redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gapminer-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            limits:
              memory: "256Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: gapminer-ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gapminer-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            limits:
              memory: "4Gi"
              nvidia.com/gpu: "1"
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"